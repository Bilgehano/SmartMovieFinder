services:
  catalog-db:
    image: postgres:16
    container_name: smf-catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartmoviefinder_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

  user-db:
    image: postgres:16
    container_name: smf-user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartmoviefinder_user_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55434:5432"
    volumes:
      - user_library_postgres_data:/var/lib/postgresql/data

  user-service:
    build:
      context: ./backend/user-service
    container_name: smf-user-service
    restart: unless-stopped
    depends_on:
      - user-db
      - redis
    environment:
      POSTGRES_HOST: user-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: smartmoviefinder_user_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379

  catalog-service:
    build:
      context: ./backend/catalog-service
    container_name: smf-catalog-service
    restart: unless-stopped
    depends_on:
      - catalog-db
    environment:
      POSTGRES_HOST: catalog-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: smartmoviefinder_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SERVER_PORT: 8081

  api-gateway:
    image: nginx:1.27-alpine
    container_name: smf-api-gateway
    restart: unless-stopped
    depends_on:
      - user-service
      - catalog-service
      - recommendation-service
    ports:
      - "8080:8080"
    volumes:
      - ./backend/api-gateway/default.conf:/etc/nginx/conf.d/default.conf:ro

  recommendation-service:
    build:
      context: ./backend/recommendation-service
    container_name: smf-recommendation-service
    restart: unless-stopped
    depends_on:
      - neo4j
      - redis
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8082
      USER_SERVICE_URL: http://user-service:8080
      CATALOG_SERVICE_URL: http://catalog-service:8081

  neo4j:
    image: neo4j:5
    container_name: smf-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    container_name: smf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data




volumes:
  catalog_postgres_data:
  user_library_postgres_data:
  neo4j_data:
  redis_data: