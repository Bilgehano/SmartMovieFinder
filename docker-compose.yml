services:
  catalog-db:
    image: postgres:16
    container_name: smf-catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartmoviefinder_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

  user-db:
    image: postgres:16
    container_name: smf-user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartmoviefinder_user_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55434:5432"
    volumes:
      - user_library_postgres_data:/var/lib/postgresql/data

  user-service:
    build:
      context: ./backend/user-service
    container_name: smf-user-service
    restart: unless-stopped
    depends_on:
      - user-db
    environment:
      POSTGRES_HOST: user-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: smartmoviefinder_user_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SERVER_PORT: 8080

  catalog-service:
    build:
      context: ./backend/catalog-service
    container_name: smf-catalog-service
    restart: unless-stopped
    depends_on:
      - catalog-db
    environment:
      POSTGRES_HOST: catalog-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: smartmoviefinder_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      SERVER_PORT: 8081

  api-gateway:
    image: nginx:1.27-alpine
    container_name: smf-api-gateway
    restart: unless-stopped
    depends_on:
      - user-service
      - catalog-service
    ports:
      - "8080:8080"
    volumes:
      - ./backend/api-gateway/default.conf:/etc/nginx/conf.d/default.conf:ro




volumes:
  catalog_postgres_data:
  user_library_postgres_data: